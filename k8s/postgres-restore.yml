apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-restore
spec:
  instances: 3
  storage:
    size: 1Gi
  bootstrap:
    recovery:
      backup:
        name: postgres-backup
  externalClusters:
    - name: postgres-cluster
      barmanObjectStore:
        destinationPath: s3://pg-backups/
        endpointURL: http://10.96.221.77:9000
        s3Credentials:
          accessKeyId:
            name: minio-creds
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: minio-creds
            key: ACCESS_SECRET_KEY