apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: craftista-voting
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Sammy-samzy/craftista
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true