apiVersion: v1
kind: ServiceAccount
metadata:
  name: migration-waiter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-reader
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-reader-binding
subjects:
  - kind: ServiceAccount
    name: migration-waiter
roleRef:
  kind: Role
  name: job-reader
  apiGroup: rbac.authorization.k8s.io
